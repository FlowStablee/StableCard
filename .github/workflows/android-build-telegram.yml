name: Android CI - Build & Send APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Build debug APK so the artifact is signed and installable (release is unsigned on CI).
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stable-app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Send APK to Telegram (best-effort)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not configured, skipping upload."
            exit 0
          fi

          APK=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found, skipping Telegram upload."
            exit 0
          fi

          set +e
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"$APK" \
            -F caption="Stable App - debug build from GitHub Actions (installable)"
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "Telegram upload failed with exit code $CURL_EXIT, but build succeeded. Ignoring."
          fi
          exit 0

